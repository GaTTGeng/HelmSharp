name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIGURATION: Release
  HELM_VERSION: v3.12.3

jobs:
  build-test-pack:
    name: Build, test, and pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Show .NET info
        run: dotnet --info

      - name: Show Helm version
        run: helm version --short

      - name: Restore
        run: dotnet restore HelmSharp.sln

      - name: Build
        run: dotnet build HelmSharp.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: >
          dotnet test HelmSharp.sln
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --no-restore
          --logger trx
          --results-directory TestResults

      - name: Pack
        run: >
          dotnet pack HelmSharp.sln
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --no-restore
          --output artifacts/packages
          -p:RepositoryUrl=${{ github.server_url }}/${{ github.repository }}
          -p:RepositoryBranch=${{ github.ref_name }}
          -p:RepositoryCommit=${{ github.sha }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: ignore

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
